<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Global Newsroom - World News, Politics, and Analysis</title>
    <style>
        :root {
            --primary-blue: #003366;
            --breaking-red: #cc0000;
            --text-dark: #333333;
            --text-light: #666666;
            --bg-gray: #f4f4f4;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-gray);
            color: var(--text-dark);
        }

        /* Header & Top Bar */
        .breaking-banner {
            background-color: #111;
            color: white;
            padding: 8px 15px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-align: center;
        }

        .breaking-banner span {
            color: var(--breaking-red);
            font-weight: bold;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        header {
            background-color: var(--primary-blue);
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            border-bottom: 4px solid var(--breaking-red);
        }

        .logo {
            font-family: 'Georgia', serif;
            font-size: 2.8rem;
            font-weight: bold;
            letter-spacing: -1px;
            margin: 0;
        }

        .date-header {
            font-size: 0.85rem;
            color: #ccc;
            margin-top: 5px;
        }

        /* Navigation */
        .menu-toggle {
            display: none;
            width: 100%;
            background-color: var(--breaking-red);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        nav {
            background-color: white;
            display: flex;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            color: var(--text-dark);
            text-decoration: none;
            padding: 15px 25px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-bottom: 3px solid transparent;
            transition: color 0.3s;
        }

        /* Main Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 15px;
        }

        main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .article-card {
            background: white;
            padding: 20px;
            border-top: 4px solid var(--primary-blue);
            transition: all 0.3s ease; /* Fallback for CSS, but we will use JS for the effect */
        }

        .featured {
            grid-column: 1 / -1;
            border-top: 4px solid var(--breaking-red);
        }

        .featured-content-wrapper {
            display: flex;
            flex-direction: column;
        }

        .img-placeholder {
            background-color: #ddd;
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-style: italic;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }

        h1, h2, h3 {
            font-family: 'Georgia', serif;
            margin-top: 0;
            color: #111;
        }

        h1 {
            color: #E3E3E3;
        }

        .featured h1 {
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .secondary-article h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .meta {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: bold;
        }

        p {
            line-height: 1.6;
            color: var(--text-dark);
        }

        .class-logo{
            filter: invert(1) brightness(2);
            height: 1em; 
            width: auto;
        }

        .read-more {
            display: inline-block;
            margin-top: 15px;
            color: var(--breaking-red);
            font-weight: bold;
            text-decoration: none;
        }

        /* Footer */
        footer {
            background-color: #222;
            color: #aaa;
            text-align: center;
            padding: 40px 15px;
            margin-top: 40px;
            font-size: 0.9rem;
        }

        footer .footer-links {
            margin-bottom: 20px;
        }

        footer a {
            color: #ccc;
            text-decoration: none;
            margin: 0 15px;
        }

        footer a:hover {
            color: white;
        }

        /* Responsive Design */
        @media (min-width: 768px) {
            .featured-content-wrapper {
                flex-direction: row;
                gap: 25px;
            }
            .featured .img-placeholder {
                flex: 1.2;
                height: auto;
                min-height: 350px;
                margin-bottom: 0;
            }
            .featured .text-content {
                flex: 1;
            }
        }

        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }
            nav {
                flex-direction: column;
                display: none;
            }
            nav.active {
                display: flex;
            }
            .menu-toggle {
                display: block;
            }
            nav a {
                border-bottom: 1px solid #eee;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="breaking-banner">
        <span>BREAKING NEWS</span> EXECUTIVE ORDER 9921 SIGNED IN OVAL OFFICE
    </div>

    <header>
        <h1 class="logo"><img src="./images/globe.png" class="main-logo "alt="globe logo"> The Global Newsroom</h1>
        <div class="date-header" id="current-date"></div>
    </header>

    <button class="menu-toggle" id="mobile-menu-btn">☰ MENU</button>
    <nav id="main-nav">
        <a href="#" class="nav-link">US</a>
        <a href="#" class="nav-link">Americas</a>
        <a href="#" class="nav-link">Europe</a>
        <a href="#" class="nav-link">Asia</a>
        <a href="#" class="nav-link">Africa</a>
    </nav>

    <div class="container">
        <main id="article-container">
        </main>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Accessibility</a>
        </div>
        <div>&copy; <span id="year"></span> The Global Newsroom. All rights reserved.</div>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Fetch the "database"
        fetch('articles.json')
            .then(response => response.json())
            .then(articles => {
                const container = document.getElementById('article-container');
                
                articles.forEach(article => {
                    // Create the article card
                    const articleEl = document.createElement('article');
                    articleEl.className = `article-card ${article.featured ? 'featured' : 'secondary-article'}`;
                    
                    // Notice the link points to 'article.html' and passes the ID in the URL!
                    articleEl.innerHTML = `
                        ${article.featured ? '<div class="featured-content-wrapper">' : ''}
                            <div class="img-placeholder" style="background-image: url('${article.image}'); background-size: cover;"></div>
                            <div class="text-content">
                                <div class="meta">${article.category} &bull; ${article.date}</div>
                                <h2><a href="article.html?id=${article.id}" style="text-decoration:none; color:inherit;">${article.title}</a></h2>
                                <p>${article.teaser}</p>
                                <a href="article.html?id=${article.id}" class="read-more">Read Full Article &rarr;</a>
                            </div>
                        ${article.featured ? '</div>' : ''}
                    `;
                    container.appendChild(articleEl);
                });
            })
            .catch(error => console.error('Error loading articles:', error));
    });
  </script>
</body>
</html>
