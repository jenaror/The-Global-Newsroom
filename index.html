<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Global Newsroom | Breaking World News</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003366;
            --breaking-red: #cc0000;
            --text-dark: #1a1a1a;
            --text-light: #555;
            --bg-gray: #ffffff;
        }

        body { font-family: 'Roboto', sans-serif; margin: 0; background: var(--bg-gray); color: var(--text-dark); }

        /* Shared Header & Logo */
        .top-nav-bar { background: #111; color: #fff; text-align: center; font-size: 12px; padding: 5px 0; font-weight: bold; text-transform: uppercase; }
        
        header { border-bottom: 1px solid #ddd; padding: 20px 0; text-align: center; background: white; }
        
        .logo-container { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: black; }
        .logo-main { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; line-height: 1; border-bottom: 4px double #000; padding-bottom: 5px; display: inline-block; }
        .logo-sub { font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; font-weight: bold; color: var(--text-light); }

        /* Navigation */
        nav { border-top: 1px solid #000; border-bottom: 1px solid #000; margin-top: 15px; display: flex; justify-content: center; background: white; position: sticky; top: 0; z-index: 1000; }
        nav a { padding: 12px 20px; color: black; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase; transition: color 0.2s; }
        nav a:hover { color: var(--breaking-red); }

        /* Container */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        main { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }

        /* Article Cards */
        .article-card { margin-bottom: 30px; }
        .featured { grid-column: 1 / -1; display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        .img-box { background: #eee; height: 350px; background-size: cover; background-position: center; border: 1px solid #ddd; }
        .secondary-article .img-box { height: 200px; }
        h1, h2 { font-family: 'Playfair Display', serif; margin: 10px 0; }
        h1 { font-size: 2.8rem; }
        .meta { color: var(--breaking-red); font-weight: bold; font-size: 12px; text-transform: uppercase; }

        /* Footer */
        footer { background: #1a1a1a; color: #888; padding: 60px 20px; margin-top: 60px; text-align: center; }
        footer a { color: #ccc; margin: 0 10px; text-decoration: none; font-size: 14px; }
        
        @media (max-width: 768px) {
            main, .featured { grid-template-columns: 1fr; }
            .logo-main { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="top-nav-bar">Wednesday, April 1, 2026 &nbsp;|&nbsp; Breaking News: Executive Order 9921 Issued</div>

    <header>
        <a href="index.html" class="logo-container">
            <span class="logo-main">The Global Newsroom</span>
            <span class="logo-sub">Truth Across Borders</span>
        </a>
        <nav>
            <a href="#">US</a>
            <a href="#">Americas</a>
            <a href="#">Europe</a>
            <a href="#">Asia</a>
            <a href="#">Africa</a>
        </nav>
    </header>

    <div class="container">
        <main id="article-container">
            </main>
    </div>

    <footer>
        <div style="margin-bottom: 20px;">
            <a href="#">About</a> <a href="#">Contact</a> <a href="#">Privacy</a> <a href="#">Archives</a>
        </div>
        <p>&copy; 2026 The Global Newsroom. All rights reserved.</p>
    </footer>

    <script>
        fetch('articles.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('article-container');
                data.forEach(art => {
                    const el = document.createElement('div');
                    el.className = `article-card ${art.featured ? 'featured' : ''}`;
                    el.innerHTML = `
                        <div class="img-box" style="background-image:url('${art.image}')"></div>
                        <div>
                            <div class="meta">${art.category}</div>
                            <h2><a href="article.html?id=${art.id}" style="color:inherit; text-decoration:none;">${art.title}</a></h2>
                            <p>${art.teaser}</p>
                        </div>
                    `;
                    container.appendChild(el);
                });
            });
    </script>
</body>
</html>
