<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Global Newsroom</title>
    </head>
<body>

    <div class="top-nav-bar">Wednesday, April 1, 2026 &nbsp;|&nbsp; Breaking News: Executive Order 9921 Issued</div>

    <header>
        <a href="index.html" class="logo-container">
            <span class="logo-main">The Global Newsroom</span>
            <span class="logo-sub">Truth Across Borders</span>
        </a>
        <nav>
            <a href="#">US</a>
            <a href="#">Americas</a>
            <a href="#">Europe</a>
            <a href="#">Asia</a>
            <a href="#">Africa</a>
        </nav>
    </header>


    
    <div class="container">
        <main style="display:block; max-width:800px; margin:0 auto;" id="full-article">
            <p>Loading the latest reports...</p>
        </main>
    </div>

    <footer>
        <div style="margin-bottom: 20px;">
            <a href="#">About</a> <a href="#">Contact</a> <a href="#">Privacy</a> <a href="#">Archives</a>
        </div>
        <p>&copy; 2026 The Global Newsroom. All rights reserved. Registered Trademark.</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        fetch('articles.json')
            .then(res => res.json())
            .then(data => {
                const art = data.find(a => a.id === id);
                if(art) {
                    document.title = art.title + " | GNR";
                    document.getElementById('full-article').innerHTML = `
                        <div class="meta">${art.category} &bull; ${art.date}</div>
                        <h1 style="font-size: 3.5rem; line-height: 1.1;">${art.title}</h1>
                        <hr style="border:0; border-top:1px solid #ddd; margin: 20px 0;">
                        <img src="${art.image}" style="width:100%; margin-bottom:20px;">
                        <div style="font-size: 1.2rem; line-height: 1.8; font-family: 'Georgia', serif;">
                            ${art.content}
                        </div>
                    `;
                }
            });
    </script>
</body>
</html>
